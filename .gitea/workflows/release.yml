name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings -A deprecated

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build and release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Prepare release
        run: nu scripts/release_prepare.nu ${{ github.ref_name }}

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          tar -C target/release -czvf droidkraft-${{ github.ref_name }}-linux-x86_64.tar.gz droidkraft-tui

      - name: Create Gitea Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body_path: RELEASE_CHANGELOG.md
          draft: false
          prerelease: false

      - name: Upload release binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: droidkraft-${{ github.ref_name }}-linux-x86_64.tar.gz
          asset_name: droidkraft-${{ github.ref_name }}-linux-x86_64.tar.gz
          asset_content_type: application/gzip

      - name: Publish to crates.io
        if: env.CRATES_IO_TOKEN != ''
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "Publishing droidkraft-core to crates.io..."
          cargo publish -p droidkraft-core --token $CRATES_IO_TOKEN --allow-dirty
          echo "Waiting for the index to update..."
          sleep 30
          echo "Publishing droidkraft-tui (TUI) to crates.io..."
          cargo publish -p droidkraft-tui --token $CRATES_IO_TOKEN --allow-dirty

      - name: Skip crates.io publish
        if: env.CRATES_IO_TOKEN == ''
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "CRATES_IO_TOKEN not set — skipping crates.io publication."
          echo "Add CRATES_IO_TOKEN to your Gitea repository secrets to enable auto-publish."
